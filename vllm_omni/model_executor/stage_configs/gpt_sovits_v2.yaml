stage_args:
  - stage_id: 0
    stage_type: llm
    is_comprehension: true
    runtime:
      process: true
      devices: "0"
      max_batch_size: 4
    engine_args:
      model_stage: gpt_sovits_v2_t2s
      model_arch: GPTSoVITSV2T2S
      worker_type: ar
      worker_cls: vllm_omni.worker.gpu_ar_worker.GPUARWorker
      scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
      distributed_executor_backend: "mp"
      enforce_eager: true
      trust_remote_code: false
      async_scheduling: false
      enable_prefix_caching: false
      skip_tokenizer_init: true
      skip_mm_profiling: true
      engine_output_type: latent
      gpu_memory_utilization: 0.35
      max_num_seqs: 4
      max_num_batched_tokens: 4096
      max_model_len: 4096
      custom_process_next_stage_input_func: vllm_omni.model_executor.stage_input_processors.gpt_sovits.t2s2decode
    output_connectors:
      to_stage_1: connector_of_shared_memory
    final_output: false
    final_output_type: text
    default_sampling_params:
      temperature: 1.0
      top_p: 1.0
      top_k: 15
      max_tokens: 1500
      seed: 42
      detokenize: false
      repetition_penalty: 1.35
      stop_token_ids: [1024]
  - stage_id: 1
    stage_type: llm
    engine_input_source: [0]
    custom_process_input_func: vllm_omni.model_executor.stage_input_processors.gpt_sovits.t2s2decode
    runtime:
      process: true
      devices: "0"
      max_batch_size: 4
    engine_args:
      model_stage: gpt_sovits_v2_decode
      model_arch: GPTSoVITSV2Decode
      worker_type: generation
      worker_cls: vllm_omni.worker.gpu_generation_worker.GPUGenerationWorker
      scheduler_cls: vllm_omni.core.sched.omni_generation_scheduler.OmniGenerationScheduler
      distributed_executor_backend: "mp"
      enforce_eager: true
      trust_remote_code: false
      async_scheduling: false
      enable_prefix_caching: false
      skip_tokenizer_init: true
      skip_mm_profiling: true
      engine_output_type: audio
      gpu_memory_utilization: 0.35
      max_num_seqs: 4
      max_num_batched_tokens: 4096
      max_model_len: 4096
    input_connectors:
      from_stage_0: connector_of_shared_memory
    final_output: true
    final_output_type: audio
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 1
      seed: 42
      detokenize: false
      repetition_penalty: 1.0

runtime:
  enabled: true
  defaults:
    window_size: -1
    max_inflight: 1

  connectors:
    connector_of_shared_memory:
      name: SharedMemoryConnector
      extra:
        shm_threshold_bytes: 65536
        connector_get_sleep_s: 0.01
        connector_get_max_wait_first_chunk: 3000
        connector_get_max_wait: 300

  edges:
    - from: 0
      to: 1
      window_size: -1
